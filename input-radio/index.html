<!DOCTYPE html>
<html lang="md">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A group of input-radio</title>

    <link rel="stylesheet" href="index.css">
</head>

<body>
    <form action="">
        <fieldset>
            <legend>Please select your preferred contact:</legend>
            <div>
                <input type="radio" name="contact" id="m1" value="email" checked>
                <label for="m1">Email</label>
                <input type="radio" name="contact" id="m2" value="phone">
                <label for="m2">Phone</label>
                <input type="radio" name="contact" id="m3" value="mail">
                <label for="m3">mail</label>
                <!-- <input type="radio" name="contact-test" id="m4" value="mail">
                <label for="m4">test</label> -->
            </div>

            <button type="submit">submit</button>
        </fieldset>
    </form>

    <script type="module" src="index.js"></script>
</body>

</html>
