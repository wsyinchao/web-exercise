<!DOCTYPE html>
<html lang="md">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title attribute</title>

    <style>
        span {
            font-size: 1.5em;
            color: blue;
        }
    </style>
</head>

<body>
    <p><span title="Hello, I am the title attribute">Hover your mouse over me for a few seconds to see my dynamically
            bound title!</span></p>
</body>

</html>
